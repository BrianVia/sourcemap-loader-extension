<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <style>
    body {
      width: 350px;
      padding: 16px;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Arial, sans-serif;
      font-size: 14px;
    }
    
    .header {
      display: flex;
      align-items: center;
      margin-bottom: 16px;
      padding-bottom: 12px;
      border-bottom: 1px solid #e0e0e0;
    }
    
    .icon {
      margin-right: 8px;
      font-size: 18px;
    }
    
    .title {
      font-weight: 600;
      color: #333;
    }
    
    .status {
      padding: 12px;
      border-radius: 6px;
      margin-bottom: 16px;
      background: #f0f9ff;
      border: 1px solid #0ea5e9;
    }
    
    .status.active {
      background: #f0fdf4;
      border-color: #22c55e;
    }
    
    .sourcemap-list {
      max-height: 300px;
      overflow-y: auto;
    }
    
    .sourcemap-item {
      padding: 12px;
      border: 1px solid #e0e0e0;
      border-radius: 6px;
      margin-bottom: 8px;
      background: #fafafa;
    }
    
    .js-url {
      font-weight: 500;
      color: #333;
      word-break: break-all;
      margin-bottom: 4px;
    }
    
    .map-url {
      font-size: 12px;
      color: #666;
      word-break: break-all;
    }
    
    .copy-btn {
      background: #0ea5e9;
      color: white;
      border: none;
      padding: 4px 8px;
      border-radius: 4px;
      font-size: 11px;
      cursor: pointer;
      margin-top: 6px;
    }
    
    .copy-btn:hover {
      background: #0284c7;
    }
    
    .empty-state {
      text-align: center;
      color: #666;
      padding: 24px;
    }
    
    .refresh-btn {
      background: #6b7280;
      color: white;
      border: none;
      padding: 8px 16px;
      border-radius: 4px;
      cursor: pointer;
      width: 100%;
      margin-bottom: 12px;
    }
    
    .refresh-btn:hover {
      background: #4b5563;
    }
  </style>
</head>
<body>
  <div class="header">
    <span class="icon">🗺️</span>
    <span class="title">Auto Source Map Loader</span>
  </div>
  
  <div class="status" id="status">
    <strong>Status:</strong> <span id="status-text">Loading...</span>
  </div>
  
  <button class="refresh-btn" id="refresh-btn">Refresh Source Maps</button>
  
  <div id="sourcemap-container">
    <div class="empty-state" id="empty-state">
      No source maps found yet. Navigate to a page with JavaScript files.
    </div>
    <div class="sourcemap-list" id="sourcemap-list" style="display: none;"></div>
  </div>

  <script>
    let sourceMaps = [];
    
    async function loadSourceMaps() {
      try {
        // Get current tab
        const [tab] = await chrome.tabs.query({ active: true, currentWindow: true });
        
        // Get source maps from background script
        const response = await chrome.runtime.sendMessage({ type: 'GET_SOURCE_MAPS' });
        sourceMaps = response.sourceMaps || [];
        
        // Also try to get from content script
        try {
          const contentResponse = await chrome.tabs.sendMessage(tab.id, { type: 'GET_CONTENT_MAPS' });
          if (contentResponse && contentResponse.sourceMaps) {
            // Merge with background data
            contentResponse.sourceMaps.forEach(([jsUrl, mapUrl]) => {
              if (!sourceMaps.find(([js]) => js === jsUrl)) {
                sourceMaps.push([jsUrl, mapUrl]);
              }
            });
          }
        } catch (e) {
          // Content script might not be ready
        }
        
        updateUI();
      } catch (error) {
        console.error('Error loading source maps:', error);
        document.getElementById('status-text').textContent = 'Error loading data';
      }
    }
    
    function updateUI() {
      const statusEl = document.getElementById('status');
      const statusTextEl = document.getElementById('status-text');
      const emptyStateEl = document.getElementById('empty-state');
      const listEl = document.getElementById('sourcemap-list');
      
      if (sourceMaps.length === 0) {
        statusTextEl.textContent = 'Monitoring for JavaScript files';
        statusEl.className = 'status';
        emptyStateEl.style.display = 'block';
        listEl.style.display = 'none';
      } else {
        statusTextEl.textContent = `Found ${sourceMaps.length} source map${sourceMaps.length === 1 ? '' : 's'}`;
        statusEl.className = 'status active';
        emptyStateEl.style.display = 'none';
        listEl.style.display = 'block';
        
        // Populate list
        listEl.innerHTML = '';
        sourceMaps.forEach(([jsUrl, mapUrl]) => {
          const item = document.createElement('div');
          item.className = 'sourcemap-item';
          
          const fileName = jsUrl.split('/').pop();
          
          item.innerHTML = `
            <div class="js-url" title="${jsUrl}">${fileName}</div>
            <div class="map-url" title="${mapUrl}">${mapUrl}</div>
            <button class="copy-btn" data-url="${mapUrl}">Copy Map URL</button>
          `;
          
          listEl.appendChild(item);
        });
      }
    }
    
    // Handle copy buttons
    document.addEventListener('click', async (e) => {
      if (e.target.classList.contains('copy-btn')) {
        const url = e.target.dataset.url;
        try {
          await navigator.clipboard.writeText(url);
          e.target.textContent = 'Copied!';
          setTimeout(() => {
            e.target.textContent = 'Copy Map URL';
          }, 1000);
        } catch (error) {
          console.error('Copy failed:', error);
        }
      }
    });
    
    // Handle refresh button
    document.getElementById('refresh-btn').addEventListener('click', loadSourceMaps);
    
    // Load initial data
    loadSourceMaps();
    
    // Refresh every 2 seconds while popup is open
    setInterval(loadSourceMaps, 2000);
  </script>
</body>
</html>
